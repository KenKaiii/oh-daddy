        xml:space="preserve"><tspan x="256" dy="-2.625em">.oOOOo.</tspan><tspan x="256" dy="1.05em">o     o</tspan><tspan x="256" dy="1.05em">O     O</tspan><tspan x="256" dy="1.05em">O     O</tspan><tspan x="256" dy="1.05em">o     o</tspan><tspan x="256" dy="1.05em">'oOOOo'</tspan></text>
